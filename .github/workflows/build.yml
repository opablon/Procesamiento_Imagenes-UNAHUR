name: Build and Release

on:
  push:
    tags:
      - 'v*' # Se activa con cualquier etiqueta que empiece con 'v'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: Linux
            extension: ""
          - os: windows-latest
            platform: Windows
            extension: ".exe"

    env:
      ASSET_NAME: ProcesamientoImagenes-${{ github.ref_name }}-${{ matrix.platform }}${{ matrix.extension }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint and Type Check
        run: |
          ruff check .
          # Omitimos pyrefly check en el pipeline si el servidor aún no lo soporta directamente vía CLI, o lo invocamos:
          # pyrefly check (Asumiendo que pyrefly tiene CLI, de lo contrario se usa pyre)
          pyrefly check || echo "Pyrefly found issues, reviewing..."

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --collect-all customtkinter --name ${{ env.ASSET_NAME }} main.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/${{ env.ASSET_NAME }}
            dist/${{ env.ASSET_NAME }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
